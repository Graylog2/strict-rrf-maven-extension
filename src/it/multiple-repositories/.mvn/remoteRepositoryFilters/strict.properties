# Multiple repository configuration
# Different rules can be configured for different repositories
# Central: allows org.slf4j and commons
# Company-repo: allows company artifacts (simulated with commons)
repo.central.allow = org.slf4j*,commons-*,org.apache*,org.codehaus*,org.sonatype*,javax.*,org.junit*,org.ow2*,com.thoughtworks*,org.assertj*,com.github*,dom4j*,oro*,org.iq80*,org.tukaani*
repo.company-repo.allow = com.company*,commons-*
